<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Tracker</title>
    {% load sass_tags %}
    {% load static %}
    <link href="{% sass_src 'tracker/scss/main.scss' %}" rel="stylesheet">
    {% csrf_token %}
</head>
<body>
    <main class="page">
        <h1 class="page__title">Collection Grid</h1>
        <div class="page__controls">
            <div class="page__search">
                <label for="search-input" class="page__search-label">Search Pokémon</label>
                <input type="search" id="search-input" class="page__search-input" placeholder="Search by name…" aria-label="Search Pokémon">
                <span class="page__search-count" id="search-count" aria-live="polite"></span>
            </div>
            <div class="page__generation">
                <label for="generation-select" class="page__generation-label">Generation</label>
                <select id="generation-select" class="page__generation-select" aria-label="Pokémon generation">
                    <option value="">All Generations</option>
                    {% for gen in generations %}
                        <option value="{{ gen }}">Generation {{ gen }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="button" class="page__add-btn" id="add-pokemon-btn" aria-label="Add new Pokémon">+ Add Pokémon</button>
        </div>
        <div class="grid" id="grid">
            {% for p in pokemon_list %}
                <div class="grid__square" data-square-id="{{ p.dex }}" data-generation="{{ p.generation }}" data-name="{{ p.name }}" role="button" tabindex="0" title="{{ p.name }}">
                    <img class="grid__sprite" src="{{ p.sprite_url }}" alt="{{ p.name }}" loading="lazy">
                    <span class="grid__badges" id="badges-{{ p.dex }}" aria-hidden="true"></span>
                </div>
            {% endfor %}
        </div>
    </main>

    <div class="modal" id="modal" aria-hidden="true">
        <div class="modal__backdrop" id="modal-backdrop"></div>
        <div class="modal__content">
            <h2 class="modal__title" id="modal-title">Options</h2>
            <div class="modal__options-view" id="modal-options-view">
                <p class="modal__options-intro">Options for this Pokémon (check what you have):</p>
                <div class="modal__options-checkboxes" id="modal-options-checkboxes"></div>
                <div class="modal__actions modal__actions--view">
                    <button type="button" class="modal__save" id="modal-save-view">Save</button>
                    <button type="button" class="modal__edit-btn" id="modal-edit-btn">Edit options</button>
                    <button type="button" class="modal__cancel" id="modal-cancel-view">Cancel</button>
                </div>
            </div>
            <div class="modal__options-edit" id="modal-options-edit" aria-hidden="true">
                <div class="modal__options-edit-list" id="modal-options-edit-list"></div>
                <button type="button" class="modal__add-option-btn" id="modal-add-option-btn">+ Add option</button>
                <div class="modal__actions">
                    <button type="button" class="modal__save" id="modal-save">Save</button>
                    <button type="button" class="modal__cancel" id="modal-cancel">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="add-modal" aria-hidden="true">
        <div class="modal__backdrop" id="add-modal-backdrop"></div>
        <div class="modal__content modal__content--form">
            <h2 class="modal__title">Add new Pokémon</h2>
            <p class="modal__hint">Fill every field. Slug is used for the sprite URL (e.g. pikachu).</p>
            <form id="add-pokemon-form" class="modal__form" novalidate>
                <div class="modal__field">
                    <label for="add-dex" class="modal__label">Dex number <span class="modal__required">*</span></label>
                    <input type="number" id="add-dex" name="dex" min="1" step="1" required placeholder="e.g. 152">
                </div>
                <div class="modal__field">
                    <label for="add-name" class="modal__label">Name <span class="modal__required">*</span></label>
                    <input type="text" id="add-name" name="name" maxlength="64" required placeholder="e.g. Chikorita">
                </div>
                <div class="modal__field">
                    <label for="add-slug" class="modal__label">Slug <span class="modal__required">*</span></label>
                    <div class="modal__slug-row">
                        <input type="text" id="add-slug" name="slug" maxlength="64" required placeholder="e.g. chikorita">
                        <button type="button" id="add-slug-from-name" class="modal__slug-btn">From name</button>
                    </div>
                </div>
                <div class="modal__field">
                    <label for="add-generation" class="modal__label">Generation <span class="modal__required">*</span></label>
                    <select id="add-generation" name="generation" required>
                        {% for gen in "123456789" %}
                        <option value="{{ gen }}">Generation {{ gen }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="modal__field">
                    <span class="modal__label">Options</span>
                    <div class="modal__options">
                        <label class="modal__checkbox">
                            <input type="checkbox" id="add-opt1" name="option_1" value="1">
                            Option 1
                        </label>
                        <label class="modal__checkbox">
                            <input type="checkbox" id="add-opt2" name="option_2" value="1">
                            Option 2
                        </label>
                        <label class="modal__checkbox">
                            <input type="checkbox" id="add-opt3" name="option_3" value="1">
                            Option 3
                        </label>
                    </div>
                </div>
                <div class="modal__form-error" id="add-form-error" aria-live="polite"></div>
                <div class="modal__actions">
                    <button type="submit" class="modal__save">Add Pokémon</button>
                    <button type="button" class="modal__cancel" id="add-modal-cancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        window.__INITIAL_CHOICES__ = {{ choices_json|safe }};
        window.__POKEMON_LIST__ = {{ pokemon_list_json|safe }};
        window.__CSRF_TOKEN__ = document.querySelector('[name=csrfmiddlewaretoken]').value;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.1.0/dist/fuse.min.js"></script>
    <script src="{% static 'tracker/js/main.js' %}"></script>
</body>
</html>
