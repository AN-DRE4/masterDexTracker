<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Tracker</title>
    {% load sass_tags %}
    {% load static %}
    <link href="{% sass_src 'tracker/scss/main.scss' %}" rel="stylesheet">
    {% csrf_token %}
</head>
<body>
    <main class="page">
        <h1 class="page__title">Collection Grid</h1>
        <div class="grid" id="grid">
            {% for p in pokemon_list %}
                <div class="grid__square" data-square-id="{{ p.dex }}" role="button" tabindex="0" title="{{ p.name }}">
                    <img class="grid__sprite" src="{{ p.sprite_url }}" alt="{{ p.name }}" loading="lazy">
                    <span class="grid__badges" id="badges-{{ p.dex }}" aria-hidden="true"></span>
                </div>
            {% endfor %}
        </div>
    </main>

    <div class="modal" id="modal" aria-hidden="true">
        <div class="modal__backdrop" id="modal-backdrop"></div>
        <div class="modal__content">
            <h2 class="modal__title" id="modal-title">Choose options</h2>
            <div class="modal__options">
                <label class="modal__checkbox">
                    <input type="checkbox" id="opt1" name="option_1" value="1">
                    Option 1
                </label>
                <label class="modal__checkbox">
                    <input type="checkbox" id="opt2" name="option_2" value="1">
                    Option 2
                </label>
                <label class="modal__checkbox">
                    <input type="checkbox" id="opt3" name="option_3" value="1">
                    Option 3
                </label>
            </div>
            <div class="modal__actions">
                <button type="button" class="modal__save" id="modal-save">Save</button>
                <button type="button" class="modal__cancel" id="modal-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        window.__INITIAL_CHOICES__ = {{ choices_json|safe }};
        window.__CSRF_TOKEN__ = document.querySelector('[name=csrfmiddlewaretoken]').value;
    </script>
    <script src="{% static 'tracker/js/main.js' %}"></script>
</body>
</html>
